services:
  # Aplicación Web (con SQLite embebido)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestor-turnos-app
    restart: always
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      - app-data:/app/data
    dns:
      - 8.8.8.8

volumes:
  app-data:
